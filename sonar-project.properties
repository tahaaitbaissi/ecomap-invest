# SonarQube (monorepo) template for EcoMap Invest
# Usage:
#   sonar-scanner \
#     -Dsonar.host.url=https://your-sonarqube \
#     -Dsonar.token=YOUR_TOKEN
#
# Optional (recommended) before scanning:
# - Backend: mvn -pl backend -am test
# - Frontend: (cd frontend && npm ci && npm test -- --coverage)

# --- Project identity ---
sonar.projectKey=tahaaitbaissi_ecomap-invest
sonar.organization=tahaaitbaissi
sonar.projectName=EcoMap Invest
sonar.projectVersion=0.0.1

# --- Server / auth (prefer CLI -D overrides; keep blank in repo) ---
sonar.host.url=https://sonarcloud.io
sonar.token=

# --- Source layout ---
# We index both Java and TypeScript sources.
sonar.sources=backend/src/main,rmi-scoring-api/src/main,rmi-scoring-server/src/main,ai-orchestrator/src/main,frontend
# Only include test roots that exist (SonarCloud fails if a listed folder is missing).
sonar.tests=backend/src/test,rmi-scoring-server/src/test,frontend

# --- File filters ---
# Keep vendored/build artifacts out of analysis.
sonar.exclusions=**/target/**,**/.next/**,**/node_modules/**,**/dist/**,**/build/**,**/out/**,**/.turbo/**,**/coverage/**,**/*.min.js,**/*.map
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# --- Java / Maven ---
# These paths must exist when scanning; run Maven build first.
sonar.java.binaries=backend/target/classes,rmi-scoring-api/target/classes,rmi-scoring-server/target/classes,ai-orchestrator/target/classes
sonar.java.test.binaries=backend/target/test-classes,rmi-scoring-server/target/test-classes

# If you generate JaCoCo XML reports, point SonarQube at them.
# (Spring Boot defaults vary; set these to your actual report locations if enabled.)
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml,rmi-scoring-server/target/site/jacoco/jacoco.xml,ai-orchestrator/target/site/jacoco/jacoco.xml

# --- JavaScript / TypeScript ---
# If you generate LCOV, point SonarQube at it.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Helps Sonar treat TS/TSX as UTF-8 consistently.
sonar.sourceEncoding=UTF-8

