# ==========================================
# 1. INFORMATIONS DU SERVEUR
# ==========================================
spring:
  application:
    name: ecomap-invest-backend

  # ==========================================
  # 2. BASE DE DONNÉES SPATIALE (PostgreSQL / PostGIS)
  # ==========================================
  datasource:
    # On utilise les variables d'environnement injectées par Docker, avec des valeurs par défaut pour le lancement en local (hors Docker)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecomap}
    username: ${SPRING_DATASOURCE_USERNAME:ecomap}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # Flyway gère le schéma; Hibernate ne fait qu'une validation stricte.
    hibernate:
      ddl-auto: validate
    show-sql: false # Passer à true pour voir les requêtes générées dans la console
    properties:
      hibernate:
        format_sql: true
        # Hibernate 7: l'ancien dialecte PostgisPG10Dialect n'existe plus
        # (PostGIS fonctionne avec PostgreSQLDialect quand l'extension est active en base)
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ==========================================
  # 3. CACHE (Redis)
  # ==========================================
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      # timeout: 2000

  flyway:
    enabled: true
    locations: classpath:db/migration
    # PostGIS image already has objects in public (e.g. spatial_ref_sys). Without baseline,
    # Flyway refuses a "non-empty" schema. Baseline at 0 so V1/V2 still apply (not skipped).
    baseline-on-migrate: true
    baseline-version: 0

  batch:
    job:
      # Do not run batch jobs on startup; use admin API or the scheduler only.
      enabled: false

# ==========================================
# 4. INTELLIGENCE ARTIFICIELLE (LangChain4j / Ollama)
# ==========================================
langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      model-name: llama3 # Ou mistral, selon ce que tu as "pull" dans ton conteneur Ollama
      temperature: 0.7 # 0.0 pour du déterministe (json), 0.7 pour l'explication textuelle

# ==========================================
# 5. SÉCURITÉ (JWT)
# ==========================================
# C'est une configuration personnalisée que tu liras dans tes classes Java avec @Value("${app.security.jwt.secret}")
app:
  security:
    jwt:
      # Clé secrète de minimum 256 bits pour HMAC-SHA256 (Ne jamais mettre la vraie clé de prod ici)
      secret: ${JWT_SECRET:MaCleSecreteDeDeveloppementTresLonguePourEcoMapInvest2026!}
      # Expiratio    n du token en millisecondes (Ex: 86400000 = 24 heures)
      expiration: 86400000

  # Nœud RMI distant (calcul de score — Systèmes distribués)
  rmi:
    scoring:
      host: ${RMI_SCORING_HOST:localhost}
      port: ${RMI_SCORING_REGISTRY_PORT:1099}
      service-name: ${RMI_SERVICE_NAME:ScoringService}
      # Dedicated pool for blocking RMI calls wrapped in CompletableFuture (REST + pipeline)
      pipeline-pool-size: ${RMI_SCORING_PIPELINE_POOL_SIZE:32}

  # Saturation scoring: local (JVM formula) vs distributed (RMI via RmiScoringClient pipeline + formula fallback)
  scoring:
    strategy: ${SCORING_STRATEGY:local}

  # Public Overpass API (see https://wiki.openstreetmap.org/wiki/Overpass_API)
  overpass:
    # Comma-separated mirrors; first is tried first, then others on 502/503/504/timeout
    interpreter-urls: ${APP_OVERPASS_URLS:https://overpass-api.de/api/interpreter,https://overpass.kumi.systems/api/interpreter,https://overpass.openstreetmap.fr/api/interpreter}
    full-retry-passes: ${APP_OVERPASS_RETRY_PASSES:3}

  # POI service: proximity analysis and saturation scoring
  poi:
    # Max bbox width/height in degrees (same order as /hexagons: swLng,swLat,neLng,neLat)
    max-bbox-deg: ${POI_MAX_BBOX_DEG:0.5}
    # Categories considered as positive drivers (anchor tenants, infrastructure)
    driver-categories: ${POI_DRIVER_CATEGORIES:category=school,category=university,category=office}
    # Radius (km) to search for driver POIs (positive influence)
    radius-drivers-km: ${POI_RADIUS_DRIVERS_KM:2.0}
    # Radius (km) to search for competitor POIs (negative influence)
    radius-competitors-km: ${POI_RADIUS_COMPETITORS_KM:1.0}
    # Maximum POI count used to normalize density to [0, 1]
    max-density-count: ${POI_MAX_DENSITY_COUNT:50}

  # H3: seed h3_hexagon for Casablanca on startup (disabled in tests; see application-test.yml)
  h3:
    seed:
      enabled: true
    # Salt for dev demographics random fields (reproducible per h3 index)
    demographics:
      salt: 893451263

  # H3 hexagon map API: viewport cells + scoring (no DB pre-seed required)
  hexagon:
    resolution: ${HEXAGON_RESOLUTION:9}
    max-cells: ${HEXAGON_MAX_CELLS:2000}
    # Reject bboxes larger than this span in degrees (lat and lng each)
    max-bbox-deg: ${HEXAGON_MAX_BBOX_DEG:0.5}
    # Comma-separated type_tag values used as competitors when no dynamic_profile
    default-competitor-tags: ${HEXAGON_DEFAULT_COMPETITORS:amenity=restaurant,shop=supermarket}
    # If demographics.population_density is present, use this cap for 0-1 scale (inhabitants / km² style)
    demographic-density-cap: ${HEXAGON_DEMO_DENSITY_CAP:20000.0}
    # 0.0 = ignore demographics table; 1.0 = use only demographics when a row exists
    demographic-blend: ${HEXAGON_DEMO_BLEND:0.5}
    # Per-cell raw score cache in Redis: score:{profileId|__none__}:{h3}
    cache:
      enabled: ${HEXAGON_SCORE_CACHE_ENABLED:true}
      ttl-seconds: ${HEXAGON_SCORE_CACHE_TTL:3600}

# ==========================================
# 6. RESILIENCE4J (Distributed Systems Resilience Patterns)
# ==========================================
resilience4j:
  circuitbreaker:
    instances:
      nominatim:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
      rmiScoring:
        # Circuit opens after 50% requests fail within a recent time window
        failure-rate-threshold: 50
        # Duration of time window for failure tracking
        slow-call-duration-threshold: 10s
        # Circuit opens also if >50% requests are slower than this
        slow-call-rate-threshold: 50
        # Number of calls before decision to open/close circuit
        permitted-number-of-calls-in-half-open-state: 3
        # How long to wait in OPEN state before trying HALF_OPEN
        wait-duration-in-open-state: 30s
        # Automatically transition to HALF_OPEN after wait duration
        automatic-transition-enabled: true
        # Size of the sliding window (number of calls to track)
        sliding-window-size: 10
        # Number of retries allowed
        minimum-number-of-calls: 5
      rmiScoringPipeline:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        automatic-transition-enabled: true
        sliding-window-size: 10
        minimum-number-of-calls: 5

  retry:
    instances:
      nominatim:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      rmiScoring:
        # Maximum number of retry attempts
        max-attempts: 3
        # Delay between retries
        wait-duration: 1s
        # Retry only on these exceptions
        retry-exceptions:
          - java.rmi.RemoteException
          - java.rmi.NotBoundException
      rmiScoringPipeline:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.rmi.RemoteException
          - java.rmi.NotBoundException

  timelimiter:
    instances:
      nominatim:
        timeout-duration: 5s
        cancel-running-future: true
      rmiScoring:
        # Timeout duration for RMI calls
        timeout-duration: 5s
        # Cancel the ongoing task if timeout is reached
        cancel-running-future: true
      rmiScoringPipeline:
        timeout-duration: 5s
        cancel-running-future: true