# ==========================================
# 1. INFORMATIONS DU SERVEUR
# ==========================================
spring:
  application:
    name: ecomap-invest-backend

  # ==========================================
  # 2. BASE DE DONNÉES SPATIALE (PostgreSQL / PostGIS)
  # ==========================================
  datasource:
    # On utilise les variables d'environnement injectées par Docker, avec des valeurs par défaut pour le lancement en local (hors Docker)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecomap}
    username: ${SPRING_DATASOURCE_USERNAME:ecomap}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # Flyway gère le schéma; Hibernate ne fait qu'une validation stricte.
    hibernate:
      ddl-auto: validate
    show-sql: false # Passer à true pour voir les requêtes générées dans la console
    properties:
      hibernate:
        format_sql: true
        # Hibernate 7: l'ancien dialecte PostgisPG10Dialect n'existe plus
        # (PostGIS fonctionne avec PostgreSQLDialect quand l'extension est active en base)
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ==========================================
  # 3. CACHE (Redis)
  # ==========================================
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      # timeout: 2000
      # JPA repositories live in PostgreSQL; Redis is only cache / RedisTemplate — do not scan them as Redis repos.
      repositories:
        enabled: false

  # Apache ActiveMQ Artemis (JMS) — profile-generated → scoring cache invalidation
  artemis:
    mode: native
    broker-url: ${SPRING_ARTEMIS_BROKER_URL:tcp://localhost:61616}
    user: ${SPRING_ARTEMIS_USER:ecomap}
    password: ${SPRING_ARTEMIS_PASSWORD:ecomap-artemis-secret}

  flyway:
    enabled: true
    locations: classpath:db/migration
    # PostGIS image already has objects in public (e.g. spatial_ref_sys). Without baseline,
    # Flyway refuses a "non-empty" schema. Baseline at 0 so V1/V2 still apply (not skipped).
    baseline-on-migrate: true
    baseline-version: 0

  batch:
    job:
      # Do not run batch jobs on startup; use admin API or the scheduler only.
      enabled: false
    jdbc:
      initialize-schema: always

# ==========================================
# 4. INTELLIGENCE ARTIFICIELLE (LangChain4j / Ollama)
# ==========================================
langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      model-name: llama3 # Ou mistral, selon ce que tu as "pull" dans ton conteneur Ollama
      temperature: 0.7 # 0.0 pour du déterministe (json), 0.7 pour l'explication textuelle

# ==========================================
# 5. SÉCURITÉ (JWT)
# ==========================================
# C'est une configuration personnalisée que tu liras dans tes classes Java avec @Value("${app.security.jwt.secret}")
app:
  security:
    jwt:
      # Clé secrète de minimum 256 bits pour HMAC-SHA256 (Ne jamais mettre la vraie clé de prod ici)
      secret: ${JWT_SECRET:MaCleSecreteDeDeveloppementTresLonguePourEcoMapInvest2026!}
      # Expiratio    n du token en millisecondes (Ex: 86400000 = 24 heures)
      expiration: 86400000

  # JMS queue names (Artemis); consumers invalidate Redis scoring cache on profile changes
  jms:
    queue:
      profile-generated: ${APP_JMS_QUEUE_PROFILE_GENERATED:profile.generated}

  # Nœud RMI distant (calcul de score — Systèmes distribués)
  rmi:
    scoring:
      host: ${RMI_SCORING_HOST:localhost}
      port: ${RMI_SCORING_REGISTRY_PORT:1099}
      service-name: ${RMI_SERVICE_NAME:ScoringService}
      # Dedicated pool for blocking RMI calls wrapped in CompletableFuture (REST + pipeline)
      pipeline-pool-size: ${RMI_SCORING_PIPELINE_POOL_SIZE:32}

  # Saturation scoring: local (JVM formula) vs distributed (RMI via RmiScoringClient pipeline + formula fallback)
  scoring:
    strategy: ${SCORING_STRATEGY:local}

  # LLM profile generation (LangChain4j Ollama; see LLMService + LangChain4jOllamaConfiguration)
  profile:
    llm:
      # 0.0 = strict JSON; general chat may use langchain4j.ollama.chat-model.temperature elsewhere
      temperature: ${APP_PROFILE_LLM_TEMP:0.0}

  explain:
    llm:
      temperature: ${APP_EXPLAIN_LLM_TEMP:0.35}
    sse-timeout-ms: ${APP_EXPLAIN_SSE_MS:180000}

  ai:
    orchestrator:
      enabled: ${APP_AI_ORCHESTRATOR_ENABLED:true}
      base-url: ${APP_AI_ORCHESTRATOR_BASE_URL:http://ai-orchestrator:8081}

  # OSM import batch job + admin API (mirrors spring.batch.job.enabled intent)
  batch:
    enabled: ${APP_BATCH_ENABLED:false}

  # Public Overpass API (see https://wiki.openstreetmap.org/wiki/Overpass_API)
  overpass:
    # Comma-separated mirrors; first is tried first, then others on 502/503/504/timeout
    interpreter-urls: ${APP_OVERPASS_URLS:https://overpass-api.de/api/interpreter,https://overpass.kumi.systems/api/interpreter,https://overpass.openstreetmap.fr/api/interpreter}
    full-retry-passes: ${APP_OVERPASS_RETRY_PASSES:3}

  # POI service: proximity analysis and saturation scoring
  poi:
    # Max bbox width/height in degrees (same order as /hexagons: swLng,swLat,neLng,neLat)
    max-bbox-deg: ${POI_MAX_BBOX_DEG:6.0}
    # Categories considered as positive drivers (anchor tenants, infrastructure)
    driver-categories: ${POI_DRIVER_CATEGORIES:category=school,category=university,category=office}
    # Radius (km) to search for driver POIs (positive influence)
    radius-drivers-km: ${POI_RADIUS_DRIVERS_KM:2.0}
    # Radius (km) to search for competitor POIs (negative influence)
    radius-competitors-km: ${POI_RADIUS_COMPETITORS_KM:1.0}
    # Maximum POI count used to normalize density to [0, 1]
    max-density-count: ${POI_MAX_DENSITY_COUNT:50}

  # H3: seed h3_hexagon for Casablanca on startup (disabled in tests; see application-test.yml)
  h3:
    seed:
      enabled: true
    # Salt for dev demographics random fields (reproducible per h3 index)
    demographics:
      salt: 893451263
      centre-lat: ${APP_DEMOGRAPHICS_CENTRE_LAT:33.5731}
      centre-lng: ${APP_DEMOGRAPHICS_CENTRE_LNG:-7.5898}

  # H3 hexagon map API: viewport intersects persisted h3_hexagon grid (see app.h3.seed) + scoring
  hexagon:
    # Pilot footprint (WGS84): hex seed + viewport clip. Envelope = OSM admin boundary bbox
    # for Casablanca city (Morocco); reproduce with scripts/extract_osm_admin_bbox.py .
    study-area:
      sw-lng: ${HEX_STUDY_SW_LNG:-7.751238}
      sw-lat: ${HEX_STUDY_SW_LAT:33.493342}
      ne-lng: ${HEX_STUDY_NE_LNG:-7.4574165}
      ne-lat: ${HEX_STUDY_NE_LAT:33.6409103}
    resolution: ${HEXAGON_RESOLUTION:9}
    max-cells: ${HEXAGON_MAX_CELLS:25000}
    # Reject bboxes larger than this span in degrees (lat and lng each)
    max-bbox-deg: ${HEXAGON_MAX_BBOX_DEG:6.0}
    # Comma-separated type_tag values used as competitors when no dynamic_profile
    default-competitor-tags: ${HEXAGON_DEFAULT_COMPETITORS:amenity=restaurant,shop=supermarket}
    # If demographics.population_density is present, use this cap for 0-1 scale (inhabitants / km² style)
    demographic-density-cap: ${HEXAGON_DEMO_DENSITY_CAP:20000.0}
    # 0.0 = ignore demographics table; 1.0 = use only demographics when a row exists
    demographic-blend: ${HEXAGON_DEMO_BLEND:0.5}
    # When no demographics row exists, synthesize density/income (same formula as dev seeder) so Docker
    # scoring and foot-traffic recompute are not blind. Set false for production census-only mode.
    synthetic-demographics-when-missing: ${HEXAGON_SYNTHETIC_DEMO_WHEN_MISSING:true}
    # Per-cell raw score cache in Redis: score:{profileId|__none__}:{h3}
    cache:
      enabled: ${HEXAGON_SCORE_CACHE_ENABLED:true}
      ttl-seconds: ${HEXAGON_SCORE_CACHE_TTL:3600}
    # Min/max raw scores over the seeded h3_hexagon grid — stable heatmap normalization (not bbox-local)
    normalization:
      max-reference-cells: ${HEXAGON_NORM_MAX_REFERENCE_CELLS:25000}
      cache-ttl-seconds: ${HEXAGON_NORM_CACHE_TTL:86400}
      # Robust stretch: map display using these percentiles when enough samples (else fall back to min/max)
      percentile-low: ${HEXAGON_NORM_PCT_LOW:5}
      percentile-high: ${HEXAGON_NORM_PCT_HIGH:95}
      min-samples-for-percentiles: ${HEXAGON_NORM_MIN_SAMPLES_PCT:20}

  # Opportunity what-if: radius for demand / fit / competition sampling
  opportunity:
    demand-radius-meters: ${OPPORTUNITY_DEMAND_RADIUS_M:800}
    competitor-radius-meters: ${OPPORTUNITY_COMPETITOR_RADIUS_M:500}
    fit-radius-meters: ${OPPORTUNITY_FIT_RADIUS_M:600}
    demand-scale: ${OPPORTUNITY_DEMAND_SCALE:8.0}

  # What-if simulation: Redis keys sim_score:{sessionId}:{h3}
  simulation:
    ttl-seconds: ${APP_SIMULATION_TTL_SECONDS:600}

  # Foot traffic simulation (deterministic archetype + hourly curves; see foot_traffic_* tables)
  foot-traffic:
    enabled: ${APP_FOOT_TRAFFIC_ENABLED:true}
    term-weight: ${APP_FOOT_TRAFFIC_TERM_WEIGHT:0.25}
    # α close to 1 keeps pre-foot-traffic score magnitudes stable while still allowing traffic to contribute.
    blend-alpha: ${APP_FOOT_TRAFFIC_BLEND_ALPHA:0.85}
    # Lower cap + sqrt normalization avoids "all hexes look like zero traffic" in the UI
    traffic-cap: ${APP_FOOT_TRAFFIC_CAP:120.0}
    sqrt-normalization: ${APP_FOOT_TRAFFIC_SQRT_NORM:true}
    density-cap-fallback: ${APP_FOOT_TRAFFIC_DENSITY_CAP_FALLBACK:50.0}
    jitter-salt: ${APP_FOOT_TRAFFIC_JITTER_SALT:893451263}
    soap:
      enabled: ${APP_FOOT_TRAFFIC_SOAP_ENABLED:true}
      url: ${APP_FOOT_TRAFFIC_SOAP_URL:http://soap-foot-traffic:8092/ws}
      pool-size: ${APP_FOOT_TRAFFIC_SOAP_POOL:24}
    cache:
      ttl-seconds: ${APP_FOOT_TRAFFIC_CACHE_TTL:172800}
    recompute:
      # Run once at boot so the UI isn't empty (skips if table already populated)
      run-on-boot: ${APP_FOOT_TRAFFIC_RECOMPUTE_ON_BOOT:true}
      run-on-boot-only-if-empty: ${APP_FOOT_TRAFFIC_RECOMPUTE_ON_BOOT_ONLY_IF_EMPTY:true}
      # Nightly recompute is optional (off by default; enable explicitly)
      scheduled-enabled: ${APP_FOOT_TRAFFIC_RECOMPUTE_SCHEDULED_ENABLED:false}
      scheduled-cron: ${APP_FOOT_TRAFFIC_RECOMPUTE_CRON:0 0 3 * * *}
      batch-size: ${APP_FOOT_TRAFFIC_RECOMPUTE_BATCH:1000}

# Task list compatibility keys (F1.2.1)
jwt:
  secret: ${JWT_SECRET:MaCleSecreteDeDeveloppementTresLonguePourEcoMapInvest2026!}
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ==========================================
# 6. RESILIENCE4J (Distributed Systems Resilience Patterns)
# ==========================================
resilience4j:
  ratelimiter:
    instances:
      nominatim:
        limit-for-period: 1
        limit-refresh-period: 1s
        timeout-duration: 0

  circuitbreaker:
    instances:
      nominatim:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
      rmiScoring:
        # Circuit opens after 50% requests fail within a recent time window
        failure-rate-threshold: 50
        # Duration of time window for failure tracking
        slow-call-duration-threshold: 10s
        # Circuit opens also if >50% requests are slower than this
        slow-call-rate-threshold: 50
        # Number of calls before decision to open/close circuit
        permitted-number-of-calls-in-half-open-state: 3
        # How long to wait in OPEN state before trying HALF_OPEN
        wait-duration-in-open-state: 30s
        # Automatically transition to HALF_OPEN after wait duration
        automatic-transition-enabled: true
        # Size of the sliding window (number of calls to track)
        sliding-window-size: 10
        # Number of retries allowed
        minimum-number-of-calls: 5
      rmiScoringPipeline:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        automatic-transition-enabled: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
      ollama:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 30s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
      profileLlm:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 45s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 3
      overpassApi:
        failure-rate-threshold: 60
        slow-call-duration-threshold: 90s
        slow-call-rate-threshold: 85
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 12
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 8
      footTrafficSoap:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 20s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 15
        minimum-number-of-calls: 5
      aiOrchestrator:
        failure-rate-threshold: 50
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        minimum-number-of-calls: 3

  retry:
    instances:
      nominatim:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      overpassApi:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - java.util.concurrent.TimeoutException
      rmiScoring:
        # Maximum number of retry attempts
        max-attempts: 3
        # Delay between retries
        wait-duration: 1s
        # Retry only on these exceptions
        retry-exceptions:
          - java.rmi.RemoteException
          - java.rmi.NotBoundException
      rmiScoringPipeline:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.rmi.RemoteException
          - java.rmi.NotBoundException
      ollama:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      profileLlm:
        max-attempts: 2
        wait-duration: 800ms
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - dev.langchain4j.model.ModelDisabledException
          - java.lang.RuntimeException
      footTrafficSoap:
        max-attempts: 3
        wait-duration: 400ms
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.ws.WebServiceException
      aiOrchestrator:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException

  timelimiter:
    instances:
      nominatim:
        timeout-duration: 5s
        cancel-running-future: true
      overpassApi:
        # Overpass QL uses [timeout:60]; allow headroom above RestTemplate read timeout edge cases
        timeout-duration: 120s
        cancel-running-future: true
      rmiScoring:
        # Timeout duration for RMI calls
        timeout-duration: 5s
        # Cancel the ongoing task if timeout is reached
        cancel-running-future: true
      rmiScoringPipeline:
        timeout-duration: 5s
        cancel-running-future: true
      ollama:
        timeout-duration: 120s
        cancel-running-future: true
      profileLlm:
        timeout-duration: 120s
        cancel-running-future: true
      footTrafficSoap:
        timeout-duration: 40s
        cancel-running-future: true
      aiOrchestrator:
        timeout-duration: 3s
        cancel-running-future: true
