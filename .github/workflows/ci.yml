name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Run unit + integration (@Tag("integration")) tests; Testcontainers needs Docker on the runner.
      - name: Maven verify (includes integration / Testcontainers)
        working-directory: backend
        run: ./mvnw -B -V -f ../pom.xml verify -Pwith-integration

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install, test, build
        working-directory: frontend
        run: npm ci && npm test && npm run build

      - name: E2E (Docker Compose + Java Selenium)
        run: docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit
