services:
  # Base de données PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ecomap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecomap
      POSTGRES_USER: ecomap
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"   # exposé pour accès externe (dev)
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecomap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - backend

  # RMI scoring node (JVM séparée — Systèmes distribués)
  rmi-scoring:
    build:
      context: .
      dockerfile: rmi-scoring-server/Dockerfile
    container_name: ecomap-rmi-scoring
    restart: unless-stopped
    environment:
      RMI_REGISTRY_PORT: "1099"
      RMI_EXPORT_PORT: "45000"
      RMI_SERVER_HOSTNAME: rmi-scoring
    ports:
      - "1099:1099"
      - "45000:45000"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1099 && nc -z 127.0.0.1 45000"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 15s

  # Ollama (LLM local)
  ollama:
    image: ollama/ollama:latest
    container_name: ecomap-ollama
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - backend
    command: serve

  # Backend Spring Boot
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ecomap-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
      rmi-scoring:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecomap
      SPRING_DATASOURCE_USERNAME: ecomap
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      OLLAMA_URL: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET:-ChangeMeInProductionAtLeast32Chars123!}
      RMI_SCORING_HOST: rmi-scoring
      RMI_SCORING_REGISTRY_PORT: "1099"
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend

  # Frontend Next.js — browser uses same-origin /api (proxied to backend); avoids CORS when using 127.0.0.1 vs localhost or LAN IPs.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_PROXY_URL: http://backend:8080
        NEXT_PUBLIC_API_URL: ""
    container_name: ecomap-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_PROXY_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    networks:
      - frontend

volumes:
  pgdata:
  redisdata:
  ollamadata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge